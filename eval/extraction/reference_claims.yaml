# Claim-extraction evaluation set.
#
# Purpose: the validation harness feeds hand-authored claims and BYPASSES the LLM claim
# extractor, so extraction quality is never measured. This set measures it directly: run the
# extractor on each paper and compare its output to expected_claims on (a) claim precision/recall
# and (b) condition retention (population / comparator / dose / direction).
#
# LIMITATION -- reference not human-verified. For this POC the expected_claims below were
# extracted by a strong model (Claude), not authored or verified by a human. The eval therefore
# measures agreement between a strong reference model and the weaker extractor under test
# (Gemini 2.5 Flash Lite), not agreement with human ground truth; any error in the reference
# propagates. A human review pass would turn this into a true gold set and is deferred on purpose.

papers:
- pmid: '38177157'
  xml: papers/38177157.xml
  title: Pulmonary hypertension.
  abstract: 'Pulmonary hypertension encompasses a range of conditions directly or indirectly leading to
    elevated pressures within the pulmonary arteries. Five main groups of pulmonary hypertension are recognized,
    all defined by a mean pulmonary artery pressure of >20 mmHg: pulmonary arterial hypertension (rare),
    pulmonary hypertension associated with left-sided heart disease (very common), pulmonary hypertension
    associated with lung disease (common), pulmonary hypertension associated with pulmonary artery obstructions,
    usually related to thromboembolic disease (rare), and pulmonary hypertension with unclear and/or multifactorial
    mechanisms (rare). At least 1% of the world''s population is affected, with a greater burden more
    likely in low-income and middle-income countries. Across all its forms, pulmonary hypertension is
    associated with adverse vascular remodelling with obstruction, stiffening and vasoconstriction of
    the pulmonary vasculature. Without proactive management this leads to hypertrophy and ultimately failure
    of the right ventricle, the main cause of death. In older individuals, dyspnoea is the most common
    symptom. Stepwise investigation precedes definitive diagnosis with right heart catheterization. Medical
    and surgical treatments are approved for pulmonary arterial hypertension and chronic thromboembolic
    pulmonary hypertension. There are emerging treatments for other forms of pulmonary hypertension; but
    current therapy primarily targets the underlying cause. There are still major gaps in basic, clinical
    and translational knowledge; thus, further research, with a focus on vulnerable populations, is needed
    to better characterize, detect and effectively treat all forms of pulmonary hypertension.'
  expected_claims:
  - claim_text: Pulmonary hypertension, across all forms, is defined by a mean pulmonary artery pressure
      greater than 20 mmHg.
    intervention: mean pulmonary artery pressure > 20 mmHg
    outcome: diagnosis of pulmonary hypertension
    population: all forms of pulmonary hypertension
    comparator: null
    direction: null
  - claim_text: Without proactive management, pulmonary hypertension leads to right ventricular hypertrophy
      and failure, the main cause of death.
    intervention: untreated pulmonary hypertension
    outcome: right ventricular failure and death
    population: null
    comparator: null
    direction: causes
  - claim_text: At least 1% of the world's population is affected by pulmonary hypertension.
    intervention: pulmonary hypertension
    outcome: prevalence of at least 1%
    population: global population
    comparator: null
    direction: null
- pmid: '38469546'
  xml: papers/38469546.xml
  title: 'Rheumatoid arthritis: pathogenesis and therapeutic advances.'
  abstract: Rheumatoid arthritis (RA) is a chronic autoimmune disease characterized by the unresolved
    synovial inflammation for tissues-destructive consequence, which remains one of significant causes
    of disability and labor loss, affecting about 0.2-1% global population. Although treatments with disease-modifying
    antirheumatic drugs (DMARDs) are effective to control inflammation and decrease bone destruction,
    the overall remission rates of RA still stay at a low level. Therefore, uncovering the pathogenesis
    of RA and expediting clinical transformation are imminently in need. Here, we summarize the immunological
    basis, inflammatory pathways, genetic and epigenetic alterations, and metabolic disorders in RA, with
    highlights on the abnormality of immune cells atlas, epigenetics, and immunometabolism. Besides an
    overview of first-line medications including conventional DMARDs, biologics, and small molecule agents,
    we discuss in depth promising targeted therapies under clinical or preclinical trials, especially
    epigenetic and metabolic regulators. Additionally, prospects on precision medicine based on synovial
    biopsy or RNA-sequencing and cell therapies of mesenchymal stem cells or chimeric antigen receptor
    T-cell are also looked forward. The advancements of pathogenesis and innovations of therapies in RA
    accelerates the progress of RA treatments.
  expected_claims:
  - claim_text: Disease-modifying antirheumatic drugs (DMARDs) effectively control inflammation and decrease
      bone destruction in rheumatoid arthritis.
    intervention: disease-modifying antirheumatic drugs (DMARDs)
    outcome: inflammation and bone destruction
    population: rheumatoid arthritis patients
    comparator: null
    direction: decreases
  - claim_text: Rheumatoid arthritis affects about 0.2-1% of the global population.
    intervention: rheumatoid arthritis
    outcome: prevalence of 0.2-1%
    population: global population
    comparator: null
    direction: null
  - claim_text: Despite DMARD treatment, overall remission rates in rheumatoid arthritis remain low.
    intervention: DMARD treatment
    outcome: remission rate
    population: rheumatoid arthritis patients
    comparator: null
    direction: null
- pmid: '38733347'
  xml: papers/38733347.xml
  title: 'Alzheimer''s disease: insights into pathology, molecular mechanisms, and therapy.'
  abstract: Alzheimer's disease (AD), the leading cause of dementia, is characterized by the accumulation
    of amyloid plaques and neurofibrillary tangles in the brain. This condition casts a significant shadow
    on global health due to its complex and multifactorial nature. In addition to genetic predispositions,
    the development of AD is influenced by a myriad of risk factors, including aging, systemic inflammation,
    chronic health conditions, lifestyle, and environmental exposures. Recent advancements in understanding
    the complex pathophysiology of AD are paving the way for enhanced diagnostic techniques, improved
    risk assessment, and potentially effective prevention strategies. These discoveries are crucial in
    the quest to unravel the complexities of AD, offering a beacon of hope for improved management and
    treatment options for the millions affected by this debilitating disease.
