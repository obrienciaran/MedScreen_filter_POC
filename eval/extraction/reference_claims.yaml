    outcome: COPD onset and progression
    population: COPD patients
    comparator: null
    direction: causes
  - claim_text: Anti-inflammatory therapy is not a first-line treatment for COPD.
    intervention: anti-inflammatory therapy
    outcome: first-line COPD treatment
    population: COPD patients
    comparator: null
    direction: null
- pmid: '39496213'
  xml: papers/39496213.xml
  title: Contemporary Management of Acute Ischemic Stroke.
  abstract: In the past decade, adding mechanical thrombectomy (MT) of intracranial arterial occlusions
    to intravenous (IV) thrombolysis has revolutionized the treatment of acute ischemic stroke (AIS) by
    expanding the therapeutic window to 24 h. Treatment decisions require establishing a high probability
    of AIS; confirming time since last known well (LKW); assessing severity of the neurological deficit;
    determining any contraindications to IV thrombolysis; and performing neuroimaging, usually noncontrast
    computed tomography (NCCT), to exclude intracerebral hemorrhage. If time since LKW is less than 4.5 h,
    patients with disabling stroke without contraindications can proceed immediately to IV thrombolysis
    while the decision about MT is under way. For some patients, the MT decision can be made on the basis
    of clinical assessment, NCCT, and CT angiography showing a large vessel occlusion. Others may require
    additional neuroimaging. Patients who are not candidates for IV thrombolysis within 4.5 h or MT should
    be immediately evaluated for eligibility for extended-window IV thrombolysis or early antiplatelet
    treatment.
  expected_claims:
  - claim_text: Adding mechanical thrombectomy to intravenous thrombolysis expanded the acute ischemic
      stroke treatment window to 24 hours.
    intervention: mechanical thrombectomy added to intravenous thrombolysis
    outcome: therapeutic window and treatment of acute ischemic stroke
    population: acute ischemic stroke with intracranial large-vessel occlusion
    comparator: intravenous thrombolysis alone
    direction: increases
  - claim_text: Patients with disabling stroke within 4.5 hours of last known well and without contraindications
      should receive intravenous thrombolysis.
    intervention: intravenous thrombolysis
    outcome: treatment of acute ischemic stroke
    population: disabling stroke within 4.5 h of last known well, no contraindications
    comparator: null
    direction: null
- pmid: '39501335'
  xml: papers/39501335.xml
  title: 'From inflammation to depression: key biomarkers for IBD-related major depressive disorder.'
  abstract: Inflammatory bowel disease (IBD) is a chronic, inflammatory, and autoimmune disorder, and
    its incidence of comorbid with major depressive disorder (MDD) is significantly higher than the general
    population. However, many patients lack proper recognition and necessary psychological health treatments.
    We aimed to identify potential biomarkers and mechanisms involved in the development of IBD comorbid
    with MDD (IBD-MDD). We utilized IBD and MDD-related datasets from the GEO database for differential
    gene expression analysis, protein-protein interaction (PPI) and pathway enrichment analysis, random
    forest algorithm, LASSO regression analysis, and construction of a disease prediction model. We assessed
    the accuracy of the model using ROC curve, explored potential mechanisms through immune infiltration
    analysis, and validated candidate biomarkers using peripheral blood samples from patients in our center's
    cohort. We identified 484 IBD-related secreted proteins and 142 key module genes associated with MDD.
    PPI analysis revealed two crucial modules primarily involved in inflammation and immune regulation.
    We identified four diagnostic genes (HGF, SPARC, ADAM12, and MMP8) from the 21 shared genes between
    IBD-related secreted proteins and MDD key module genes, constructed a nomogram model and confirmed
    its accuracy using ROC curve from an external independent dataset. Immune infiltration analysis revealed
    significant associations between the four diagnostic genes, and cellular immune dysregulation in MDD.
    Finally, we validated the expression patterns of the four diagnostic genes in our cohort. Our study
    discovered four candidate biomarkers for IBD-MDD, providing new insights for the diagnosis and therapeutic
    intervention of serum-based IBD comorbid with MDD.
  expected_claims:
  - claim_text: Patients with inflammatory bowel disease have a significantly higher incidence of comorbid
      major depressive disorder than the general population.
    intervention: inflammatory bowel disease
    outcome: comorbid major depressive disorder
    population: patients with inflammatory bowel disease
    comparator: general population
    direction: increases
  - claim_text: Four genes (HGF, SPARC, ADAM12, MMP8) are candidate diagnostic biomarkers for IBD comorbid
      with major depressive disorder.
    intervention: HGF, SPARC, ADAM12, and MMP8 expression
    outcome: diagnosis of IBD with comorbid major depressive disorder
    population: patients with IBD and major depressive disorder
    comparator: null
    direction: null
