  # ------------------------------------------------------------- fabrication ----
  # Research-misconduct cases. The claim is false because the data were fabricated or
  # falsified, and the paper was formally retracted. The answer_key is the RETRACTION
  # NOTICE, which retrieval should reach via the retracted paper's retraction link.
  - id: wakefield-mmr-autism
    claim_text: "The MMR vaccine causes autism / pervasive developmental disorder in children."
    normalized:
      intervention: "measles-mumps-rubella (MMR) vaccine"
      outcome: "autism / pervasive developmental disorder"
      population: "children"
      direction: causes
    status: reversed
    category: fabrication
    answer_key: ["20137807"]   # Lancet 2010 retraction of Wakefield et al. (PMID 9500320)
    reversal_year: 2010
    notes: "Falsified data; the Lancet fully retracted the 1998 paper in 2010."

