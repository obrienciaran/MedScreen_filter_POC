# Gold set for the negative-evidence recall harness.
#
# Each `reversed` entry is a claim that was once mainstream and was later
# contradicted/superseded by higher-tier evidence. `answer_key` lists the PMIDs of
# the landmark refuting study/SR/guideline that retrieval SHOULD surface. Every PMID
# below was verified against PubMed esummary (title + year) at authoring time.
#
# A `reversed` entry also carries a `category`:
#   * `reversal` (default): good-faith science later superseded; the disproving evidence
#     is a newer trial/review found by keyword/high-tier search.
#   * `fabrication`: research misconduct; the disproving evidence is a RETRACTION NOTICE,
#     so retrieval must surface it via the retraction link, a different path worth
#     measuring separately.
#
# `still_true` entries are controls: they should NOT be flagged as contradicted.
# They measure the false-contradiction rate (a harness that flags everything has
# perfect recall and zero value).
#
# This is a high-precision set (28 reversals + 4 fabrications + 32 controls). It doubles an
# earlier seed of half the size; expand it further before treating any recall number as
# definitive — the metric's stability depends on N. Conditions are kept attached in
# `normalized` on purpose: condition-stripped claims manufacture false refutations (the HCQ
# lesson).

entries:
  # ---------------------------------------------------------------- reversed ----
  - id: hrt-chd
    claim_text: "Hormone replacement therapy prevents coronary heart disease in healthy postmenopausal women."
    normalized:
      intervention: "estrogen plus progestin hormone replacement therapy"
      outcome: "coronary heart disease events"
      population: "healthy postmenopausal women"
      comparator: "placebo"
      direction: prevents
    status: reversed
    answer_key: ["12117397"]   # WHI, JAMA 2002
    reversal_year: 2002
    notes: "Observational data suggested cardioprotection; the WHI RCT showed increased CHD risk."

  - id: cast-antiarrhythmics
    claim_text: "Encainide and flecainide reduce mortality after myocardial infarction by suppressing ventricular arrhythmias."
    normalized:
      intervention: "encainide or flecainide (class Ic antiarrhythmics)"
      outcome: "mortality"
      population: "patients after myocardial infarction with ventricular ectopy"
      comparator: "placebo"
      direction: decreases
    status: reversed
    answer_key: ["1900101", "2473403"]   # CAST, NEJM 1991 + 1989 preliminary report
    reversal_year: 1989
    notes: "Arrhythmia suppression was assumed protective; CAST found increased mortality."

  - id: ulcer-stress-not-infection
